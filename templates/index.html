<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Detection</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        * {
    box-sizing: border-box;
}
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h1 {
            color: #6a11cb;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
            resize: none;
            outline: none;
            margin-bottom: 20px;
        }

        textarea:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 6px rgba(106,17,203,0.3);
        }

        .btn {
            background-color: #6a11cb;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2575fc;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .spam {
            background-color: #ffdddd;
            color: #d8000c;
        }

        .ham {
            background-color: #ddffdd;
            color: #4f8a10;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.6em;
            }
            p {
                font-size: 1em;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1><i class="fas fa-shield-alt"></i> Spam Detection</h1>
    <p>Enter a message below to check whether it is spam or ham.</p>

    <form method="post">
        <textarea name="message" placeholder="Type your message here..." required>{{message}}</textarea>
        <button type="submit" class="btn">
            <i class="fas fa-check"></i> Check Message
        </button>
    </form>

    {% if result %}
        <div class="result {{ css_class }}">
            Result: {{ result }}
        </div>
    {% endif %}
</div>

</body>
</html>
